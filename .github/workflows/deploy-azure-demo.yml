name: Verify, publish, and deploy demo

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-demo
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Run regression suite and build artifact
        run: ./gradlew clean test bootJar

      - name: Determine immutable image name
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "uri=ghcr.io/${repository}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${repository}:main" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.latest }}

  deploy:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    needs: verify-and-publish
    runs-on: ubuntu-latest
    environment: azure-demo
    steps:
      - name: Check out deployment bundle
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Configure pinned SSH host identity
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.AZURE_VM_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/azure-demo
          chmod 600 ~/.ssh/azure-demo
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy versioned deployment configuration
        shell: bash
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          tar -czf /tmp/sentinel-deployment.tgz deployment/azure-demo
          scp -i ~/.ssh/azure-demo /tmp/sentinel-deployment.tgz "${VM_USER}@${VM_HOST}:/tmp/sentinel-deployment.tgz"
          ssh -i ~/.ssh/azure-demo "${VM_USER}@${VM_HOST}" 'mkdir -p /opt/sentinel/release && tar -xzf /tmp/sentinel-deployment.tgz -C /opt/sentinel/release && rm /tmp/sentinel-deployment.tgz'

      - name: Pull and activate immutable image
        shell: bash
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
          SENTINEL_IMAGE: ${{ needs.verify-and-publish.outputs.image }}
        run: |
          ssh -i ~/.ssh/azure-demo "${VM_USER}@${VM_HOST}" "docker pull '${SENTINEL_IMAGE}' && SENTINEL_IMAGE='${SENTINEL_IMAGE}' bash /opt/sentinel/release/deployment/azure-demo/start-azure.sh"

      - name: Verify stable public readiness URL
        shell: bash
        env:
          DEMO_HEALTH_URL: ${{ vars.AZURE_DEMO_HEALTH_URL }}
        run: curl --fail --show-error --silent --retry 12 --retry-delay 5 "$DEMO_HEALTH_URL"
