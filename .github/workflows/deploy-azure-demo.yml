name: Verify, publish, and deploy demo

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-demo
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Run regression suite and build artifact
        run: |
          npm ci --prefix frontend --no-audit --no-fund
          npm run --prefix frontend typecheck
          npm run --prefix frontend build
          bash ./gradlew clean test bootJar

      - name: Determine immutable image name
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "uri=ghcr.io/${repository}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${repository}:main" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.latest }}

  deploy:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    needs: verify-and-publish
    runs-on: ubuntu-latest
    environment: azure-demo
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out deployment bundle
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Exchange GitHub identity for a short-lived Azure token
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Activate the exact verified release through Azure Run Command
        shell: bash
        env:
          SENTINEL_IMAGE: ${{ needs.verify-and-publish.outputs.image }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_VM_NAME: ${{ vars.AZURE_VM_NAME }}
          AZURE_DEMO_ADDRESS: ${{ vars.AZURE_DEMO_ADDRESS }}
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_VM_NAME" \
            --command-id RunShellScript \
            --scripts @deployment/azure-demo/activate-release.sh \
            --parameters \
              "$GITHUB_SHA" \
              "$SENTINEL_IMAGE" \
              "$AZURE_DEMO_ADDRESS" \
            --query 'value[0].message' \
            --output tsv

      - name: Verify stable public readiness URL
        shell: bash
        env:
          DEMO_HEALTH_URL: ${{ vars.AZURE_DEMO_HEALTH_URL }}
        run: curl --fail --show-error --silent --retry 12 --retry-delay 5 "$DEMO_HEALTH_URL"
