services:
  ollama:
    image: ollama/ollama:0.32.1@sha256:6345fbc18bd73a1e16404be681dbc6fd291a027cab43ed541abe78c4c81051b0
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    mem_limit: 8g
    networks: [sentinel-private]

  model-init:
    image: ollama/ollama:0.32.1@sha256:6345fbc18bd73a1e16404be681dbc6fd291a027cab43ed541abe78c4c81051b0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull qwen3:4b
        ollama pull nomic-embed-text
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks: [sentinel-private]

  sentinel:
    depends_on:
      model-init:
        condition: service_completed_successfully

  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    restart: unless-stopped
    environment:
      SENTINEL_DEMO_ADDRESS: ${SENTINEL_DEMO_ADDRESS:?Set the public HTTP hostname or custom HTTPS domain}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      sentinel:
        condition: service_started
    mem_limit: 256m
    networks: [sentinel-private]

volumes:
  ollama-data:
  caddy-data:
  caddy-config:
