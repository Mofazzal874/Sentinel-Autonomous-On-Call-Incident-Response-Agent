spring:
  application:
    name: sentinel
  datasource:
    url: "${SENTINEL_DB_URL:jdbc:postgresql://localhost:55432/sentinel}"
    username: "${SENTINEL_DB_USERNAME:sentinel}"
    password: "${SENTINEL_DB_PASSWORD:sentinel}"
  flyway:
    enabled: true
  data:
    redis:
      host: "${SENTINEL_REDIS_HOST:localhost}"
      port: "${SENTINEL_REDIS_PORT:6379}"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          time_zone: UTC
        order_inserts: true
        order_updates: true
  rabbitmq:
    host: "${SENTINEL_RABBITMQ_HOST:localhost}"
    port: "${SENTINEL_RABBITMQ_PORT:5672}"
    username: "${SENTINEL_RABBITMQ_USERNAME:sentinel}"
    password: "${SENTINEL_RABBITMQ_PASSWORD:sentinel}"
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        concurrency: 4
        max-concurrency: 16
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
  threads:
    virtual:
      enabled: true
  ai:
    model:
      chat: "${SENTINEL_AI_CHAT_MODEL:none}"
      embedding: "${SENTINEL_AI_EMBEDDING_MODEL:none}"
    ollama:
      base-url: "${SENTINEL_OLLAMA_BASE_URL:http://localhost:11434}"
      init:
        pull-model-strategy: never
    vectorstore:
      type: "${SENTINEL_AI_VECTOR_STORE:none}"
      pgvector:
        initialize-schema: false
        schema-validation: true
        table-name: runbook_embedding
        index-type: HNSW
        distance-type: COSINE_DISTANCE

sentinel:
  alerts:
    dedup-window: 10m
  messaging:
    publisher-confirm-timeout: 5s
    max-consumer-attempts: 3
    retry-delay: 2s
  security:
    jwt-secret: "${SENTINEL_JWT_SECRET}"
    jwt-issuer: "${SENTINEL_JWT_ISSUER:sentinel-local}"
    jwt-audience: "${SENTINEL_JWT_AUDIENCE:sentinel-api}"
    webhook-secret: "${SENTINEL_WEBHOOK_SECRET}"
    webhook-tolerance: 5m
    max-webhook-body-size: 64KB
