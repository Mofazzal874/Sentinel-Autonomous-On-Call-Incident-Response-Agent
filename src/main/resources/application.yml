spring:
  application:
    name: sentinel
  datasource:
    url: "${SENTINEL_DB_URL:jdbc:postgresql://localhost:55432/sentinel}"
    username: "${SENTINEL_DB_USERNAME:sentinel}"
    password: "${SENTINEL_DB_PASSWORD:sentinel}"
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          time_zone: UTC
        order_inserts: true
        order_updates: true
